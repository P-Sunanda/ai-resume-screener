# ============================================
# AI Resume Screener - application.properties
# Author: Sunanda Panda
# ============================================

# App Config
server.port=8080
spring.application.name=ai-resume-screener

# ? Google Gemini API Key (FREE)
# Get yours at: https://aistudio.google.com/app/apikey
# Set as environment variable in GCP Cloud Run
gemini.api.key=${GEMINI_API_KEY}

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# Actuator (GCP health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.sunanda=INFO
logging.level.org.springframework.web=INFO
